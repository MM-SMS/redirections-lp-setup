name: Trigger Vercel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Vercel Deploy
        run: |
          curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
      - name: Deploy Project C
        run: curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_ONYX }}"
